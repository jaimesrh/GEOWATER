<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoWater — Técnicos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="inicio.html">💧 GeoWater</a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-white" id="nombreUsuario"></span>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-0 fw-bold">🔧 Técnicos</h2>
        <small class="text-muted">Gestión del personal técnico</small>
      </div>
      <a class="btn btn-primary" href="tecnicos-registrar.html">+ Nuevo Técnico</a>
    </div>

    <div id="alerta" class="mb-3"></div>

    <div class="mb-4">
      <input type="text" id="buscador" class="form-control"
             placeholder="🔍 Buscar por nombre o especialidad..." oninput="filtrar()">
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-bordered table-hover table-striped mb-0">
          <thead class="table-primary">
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Especialidad</th>
              <th>Disponibilidad</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaTecnicos"></tbody>
        </table>
      </div>
    </div>

    <p id="contador" class="text-muted mt-2">Mostrando 0 técnicos</p>
  </div>

  <script src="./js/tecnicos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
