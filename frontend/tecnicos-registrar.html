<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoWater — Registrar Técnico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="inicio.html">💧 GeoWater</a>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="d-flex align-items-center mb-4">
      <a href="tecnicos.html" class="btn btn-outline-secondary btn-sm me-3">&larr; Regresar</a>
      <h2 class="mb-0 fw-bold">Registrar Técnico</h2>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <form onsubmit="event.preventDefault(); crearTecnico()">

              <div class="form-group mb-3">
                <label for="inputNombre" class="fw-semibold">Nombre completo</label>
                <input class="form-control" type="text" id="inputNombre"
                       placeholder="Nombre del técnico">
              </div>

              <div class="form-group mb-3">
                <label for="inputEspecialidad" class="fw-semibold">Especialidad</label>
                <input class="form-control" type="text" id="inputEspecialidad"
                       placeholder="Ej: Plomería, Detección de fugas...">
              </div>

              <div class="form-group mb-4">
                <label for="inputDisponibilidad" class="fw-semibold">Disponibilidad</label>
                <select class="form-select" id="inputDisponibilidad">
                  <option value="Disponible">Disponible</option>
                  <option value="Ocupado">Ocupado</option>
                </select>
              </div>

              <button class="btn btn-primary" id="btnGuardar" type="submit">
                Registrar Técnico
              </button>
              <a href="tecnicos.html" class="btn btn-outline-secondary ms-2">Cancelar</a>

            </form>
          </div>
        </div>
        <div id="alerta" class="mt-3"></div>
      </div>
    </div>
  </div>

  <script src="./js/tecnicos-registrar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
