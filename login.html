<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoWater — Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); min-height: 100vh; }
    .card { border: none; border-radius: 16px; }
    .brand-logo { font-size: 2rem; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">

        <div class="text-center mb-4">
          <div class="brand-logo">💧</div>
          <h2 class="fw-bold text-white">GeoWater</h2>
          <p class="text-white-50">Sistema de Gestión de Fugas de Agua</p>
        </div>

        <div id="alerta"></div>

        <div class="card shadow-lg">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-4 text-center">Iniciar Sesión</h5>
            <form onsubmit="event.preventDefault(); login()">
              <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" id="inputEmail" class="form-control"
                       placeholder="correo@ejemplo.com" autofocus>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Contraseña</label>
                <input type="password" id="inputPassword" class="form-control"
                       placeholder="••••••••">
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary" id="btnLogin">
                  Ingresar
                </button>
              </div>
            </form>
          </div>
        </div>

        <p class="text-center mt-3 text-white-50">
          ¿No tienes cuenta? <a href="registro.html" class="text-white fw-semibold">Regístrate aquí</a>
        </p>

      </div>
    </div>
  </div>

  <script src="./js/login.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
