<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoWater — Inicio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .modulo-card { transition: transform .2s, box-shadow .2s; cursor: pointer; }
    .modulo-card:hover { transform: translateY(-4px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15) !important; }
  </style>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
      <span class="navbar-brand fw-bold">💧 GeoWater</span>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-white" id="nombreUsuario"></span>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
          Cerrar Sesión
        </button>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div id="alerta"></div>

    <!-- Spinner de carga -->
    <div id="spinner" class="text-center py-5">
      <div class="spinner-border text-primary"></div>
      <p class="text-muted mt-2">Cargando sistema...</p>
    </div>

    <!-- Contenido principal -->
    <div id="contenido" class="d-none">
      <h2 class="fw-bold mb-1" id="tituloBienvenida"></h2>
      <p class="text-muted mb-4" id="fechaHora"></p>

      <h5 class="fw-semibold mb-3 text-secondary">Módulos del sistema</h5>
      <div class="row g-3" id="tarjetasModulos"></div>
    </div>
  </div>

  <script src="./js/inicio.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
